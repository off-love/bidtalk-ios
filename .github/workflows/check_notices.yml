name: 입찰알리미 공고 체크 (수동)

on:
  # 운영 스케줄러는 off-love/g2b-bot 저장소에서만 실행합니다.
  # 이 앱 저장소의 내장 서버는 긴급 점검/수동 실행용으로만 유지합니다.
  workflow_dispatch:

permissions:
  contents: write             # state.json 커밋 권한

concurrency:
  group: notice-check
  cancel-in-progress: false   # 진행 중인 작업은 완료 대기

env:
  G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
  G2B_PREBID_API_KEY: ${{ secrets.G2B_PREBID_API_KEY }}
  FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
  TZ: Asia/Seoul

jobs:
  check:
    # Keep manual checks away from ubuntu-latest/24.x capacity incidents.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${G2B_API_KEY}" || { echo "G2B_API_KEY secret is missing"; exit 1; }
          test -n "${FIREBASE_CREDENTIALS}" || { echo "FIREBASE_CREDENTIALS secret is missing"; exit 1; }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notice checker
        run: python -m src.main

      - name: Commit state changes
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/data/
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git pull --rebase origin main || git rebase --abort
          git push || echo "Push failed, will retry next run"
